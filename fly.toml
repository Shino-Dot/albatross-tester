# fly.toml app configuration file generated for albatross-2025 on 2025-06-24T01:59:47+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
app = 'albatross-2025'
primary_region = 'nrt'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/accounts/login/" # ← ★重要★ 確実に存在する、軽いページを指定！
    protocol = "http"

[[http_service.mounts]]
  source = "albatross_data"
  destination = "/data"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

  # ▼▼▼ このブロックを、一番下に追加！ ▼▼▼
[deploy]
  release_command = "python manage.py migrate --no-input"