{% extends "albatross_app/base.html" %}

{% block title %}パスワード変更完了{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7"> <!--少しだけ横幅広げてもいいかも -->
            <!-- ▼▼▼ ここからが変更部分！ ▼▼▼ #} -->
            <div class="card text-center">
                <div class="card-body p-5"> <!--パディングを多めに取ってリッチに！ -->
                    <h2 class="card-title text-success mb-4">
                        <i class="bi bi-shield-lock-fill"></i> <!-- Bootstrap Iconsの盾と鍵アイコン -->
                        パスワードを変更しました
                    </h2>
                    <p class="card-text">
                        パスワードの変更が正常に完了しました。
                    </p>
                    <p class="card-text lead mt-4"> <!-- leadクラスで少し文字を大きく -->
                        <strong>このタブを閉じて、<br class="d-sm-none">元の画面から再度ログインしてください。</strong>
                        <!-- スマホサイズで改行入れると読みやすいかも #} -->
                    </p>
                    <div class="mt-4">
                        <button id="close-window-btn" class="btn btn-secondary">
                            今すぐタブを閉じる
                        </button>
                    </div>
                </div>
            </div>
            <!-- ▲▲▲ ここまでが変更部分！ ▲▲▲ -->
        </div>
    </div>
</div>

<!--▼▼▼ JavaScriptも忘れずに追加！ ▼▼▼ -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const closeButton = document.getElementById('close-window-btn');
        if (closeButton) {
            closeButton.addEventListener('click', function() {
                console.log("「今すぐタブを閉じる」ボタンが押されました。");
                window.close();
            });
        }
        
        // パスワード変更完了ページでは、自動クローズはなくてもいいかも？
        // ユーザーがメッセージを読む時間をちゃんと確保するためにね！
        // もし入れたいなら、アカウント削除の時と同じ setTimeout をここに追加すればOK！
    });
</script>
{% endblock %}
